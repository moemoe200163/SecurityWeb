services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4000
    depends_on:
      - backend
    networks:
      - securityweb

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://securityweb:securityweb123@db:5432/securityweb
      - PORT=4000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - securityweb

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=securityweb
      - POSTGRES_PASSWORD=securityweb123
      - POSTGRES_DB=securityweb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securityweb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - securityweb

networks:
  securityweb:
    driver: bridge

volumes:
  pgdata:
