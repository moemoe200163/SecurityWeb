services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4000
    depends_on:
      - backend
    networks:
      - securityweb

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://securityweb:securityweb123@db:5432/securityweb
      - PORT=4000
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_API_ENDPOINT=${MINIMAX_API_ENDPOINT:-https://api.minimax.chat/v1}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-MiniMax-M2.7}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - securityweb

  db:
    image: postgres:15-alpine
    container_name: securityweb-db-1
    restart: unless-stopped
    environment:
      - POSTGRES_USER=securityweb
      - POSTGRES_PASSWORD=securityweb123
      - POSTGRES_DB=securityweb
    command: >
      postgres
      -c shared_buffers=384MB
      -c max_connections=40
      -c work_mem=10MB
      -c maintenance_work_mem=256MB
      -c effective_cache_size=1GB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c min_wal_size=100MB
      -c max_wal_size=1GB
      -c autovacuum_max_workers=2
      -c log_min_duration_statement=1000
      -c shared_preload_libraries=pg_stat_statements
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securityweb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - securityweb
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  securityweb:
    driver: bridge

volumes:
  pgdata:
