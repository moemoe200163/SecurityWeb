# OWASP CRS Configuration
SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess Off
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecPcreMatchLimit 1000
SecPcreMatchLimitRecursion 1000

# Anomaly Scoring
SecAction "id:900200,phase:1,pass,nolog,setvar:tx.anomaly_score=0"
SecAction "id:900210,phase:1,pass,nolog,setvar:tx.inbound_anomaly_score=0"
SecAction "id:900220,phase:1,pass,nolog,setvar:tx.outbound_anomaly_score=0"

# Include OWASP CRS rules
Include /etc/nginx/waf/rules/REQUEST-901-INITIALIZATION.conf
Include /etc/nginx/waf/rules/REQUEST-910-IP-REPUTATION.conf
Include /etc/nginx/waf/rules/REQUEST-911-METHOD-ENFORCEMENT.conf
Include /etc/nginx/waf/rules/REQUEST-912-DOS-PROTECTION.conf
Include /etc/nginx/waf/rules/REQUEST-913-SCANNER-DETECTION.conf
Include /etc/nginx/waf/rules/REQUEST-920-PROTOCOL-ENFORCEMENT.conf
Include /etc/nginx/waf/rules/REQUEST-921-PROTOCOL-ATTACK.conf
Include /etc/nginx/waf/rules/REQUEST-930-APPLICATION-ATTACK-LFI.conf
Include /etc/nginx/waf/rules/REQUEST-931-APPLICATION-ATTACK-RFI.conf
Include /etc/nginx/waf/rules/REQUEST-932-APPLICATION-ATTACK-RCE.conf
Include /etc/nginx/waf/rules/REQUEST-933-APPLICATION-ATTACK-PHP.conf
Include /etc/nginx/waf/rules/REQUEST-934-APPLICATION-ATTACK-NODEJS.conf
Include /etc/nginx/waf/rules/REQUEST-941-APPLICATION-ATTACK-XSS.conf
Include /etc/nginx/waf/rules/REQUEST-942-APPLICATION-ATTACK-SQLI.conf
Include /etc/nginx/waf/rules/REQUEST-943-APPLICATION-ATTACK-SESSION-FIXATION.conf
Include /etc/nginx/waf/rules/REQUEST-944-APPLICATION-ATTACK-JAVA.conf
Include /etc/nginx/waf/rules/REQUEST-949-BLOCKING-EVALUATION.conf
Include /etc/nginx/waf/rules/RESPONSE-950-DATA-LEAKAGES.conf
Include /etc/nginx/waf/rules/RESPONSE-951-DATA-LEAKAGES-SQL.conf
Include /etc/nginx/waf/rules/RESPONSE-952-DATA-LEAKAGES-JAVA.conf
Include /etc/nginx/waf/rules/RESPONSE-953-DATA-LEAKAGES-PHP.conf
Include /etc/nginx/waf/rules/RESPONSE-954-DATA-LEAKAGES-IIS.conf
Include /etc/nginx/waf/rules/RESPONSE-959-BLOCKING-EVALUATION.conf
Include /etc/nginx/waf/rules/RESPONSE-980-CORRELATION.conf
