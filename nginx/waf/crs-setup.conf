# OWASP CRS Configuration
SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess Off
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecPcreMatchLimit 1000
SecPcreMatchLimitRecursion 1000

# Anomaly Scoring
SecAction "id:900200,phase:1,pass,nolog,setvar:tx.anomaly_score=0"
SecAction "id:900210,phase:1,pass,nolog,setvar:tx.inbound_anomaly_score=0"
SecAction "id:900220,phase:1,pass,nolog,setvar:tx.outbound_anomaly_score=0"

# Include OWASP CRS rules
Include /etc/nginx/waf/rules/crs-setup.conf
Include /etc/nginx/waf/rules/rules/*.conf
