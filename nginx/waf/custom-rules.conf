# Custom WAF Rules for SecurityWeb

# 允許滲透測試流量（不阻擋常見滲透測試工具的攻擊特徵）
SecRule REQUEST_URI "@contains /pentest" \
    "id:1000,phase:1,pass,nolog,ctl:ruleRemoveById=941100,ctl:ruleRemoveById=942100"

# Rate Limiting - 每分鐘 100 請求 per IP
SecRule IP:REPUTATION_SCORE "@eq 0" \
    "id:2000,phase:1,pass,nolog,setvar:tx.rate=+1"

# 阻擋明顯恶意请求
SecRule ARGS "@contains <script" \
    "id:3000,phase:2,deny,status:403,log,msg:'XSS Attack Detected'"

SecRule ARGS "@rx (union|select|insert|update|delete|drop|exec|execute)\s" \
    "id:3001,phase:2,deny,status:403,log,msg:'SQL Injection Attempt'"

# 阻擋命令注入
SecRule ARGS "@contains |whoami" \
    "id:3002,phase:2,deny,status:403,log,msg:'Command Injection Attempt'"

SecRule ARGS "@contains |cat /etc/passwd" \
    "id:3003,phase:2,deny,status:403,log,msg:'LFI Attempt'"